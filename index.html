                                    <div className="text-center lg:text-left shrink-0">
                                        <h2 className="text-3xl md:text-4xl font-serif text-gray-800 mb-1">Thước Phim Chung</h2>
                                        <p className="text-gray-500 text-xs tracking-wider uppercase">Kho tàng lưu trữ kỷ niệm lớp</p>
                                    </div>
                                    <div className="flex bg-white/60 backdrop-blur-md rounded-full p-1 border border-rose-100 shadow-sm overflow-hidden text-[10px] md:text-xs">
                                        {['all', '10A3', '11A3', '12A3'].map(g => (
                                            <button key={g} onClick={() => setGradeFilter(g)} className={`px-3 md:px-5 py-1.5 font-bold transition-all duration-300 rounded-full ${gradeFilter === g ? 'bg-gradient-to-r from-rose-400 to-rose-500 text-white shadow-md' : 'text-gray-500 hover:bg-white/80'}`}>{g === 'all' ? 'Tất cả' : g}</button>
                                        ))}
                                    </div>
                                    <div className="flex flex-wrap justify-center gap-2 md:gap-3 shrink-0">
                                        <div className="flex bg-white/50 backdrop-blur rounded-full p-1 border border-gray-200 shadow-sm overflow-hidden text-[10px] md:text-xs mr-1">
                                            <button onClick={() => setMediaFilter('all')} className={`px-2 md:px-3 py-1.5 font-semibold transition-all duration-300 rounded-full ${mediaFilter === 'all' ? 'bg-gray-800 text-white shadow-md' : 'text-gray-500'}`} title="Tất cả"><i className="fa-solid fa-border-all"></i></button>
                                            <button onClick={() => setMediaFilter('image')} className={`px-2 md:px-3 py-1.5 font-semibold transition-all duration-300 rounded-full ${mediaFilter === 'image' ? 'bg-gray-800 text-white shadow-md' : 'text-gray-500'}`} title="Chỉ Ảnh"><i className="fa-regular fa-image"></i></button>
                                            <button onClick={() => setMediaFilter('video')} className={`px-2 md:px-3 py-1.5 font-semibold transition-all duration-300 rounded-full ${mediaFilter === 'video' ? 'bg-gray-800 text-white shadow-md' : 'text-gray-500'}`} title="Chỉ Video"><i className="fa-solid fa-video"></i></button>
                                        </div>

                                        <button onClick={() => { setTheaterModeType('normal'); setIsTheaterMode(true); }} className="flex items-center gap-2 px-3 md:px-4 py-2 md:py-2.5 bg-gray-800 text-white rounded-full text-[10px] md:text-xs font-bold tracking-widest hover:shadow-lg hover:-translate-y-1 transition-all shadow-md">
                                            <i className="fa-solid fa-film text-sm text-rose-300"></i> <span className="hidden sm:inline">Chiếu</span>
                                        </button>
                                        
                                        {!appSettings.isTimelineLocked && !isGuest && (
                                            <button onClick={() => { setMediaForm({...mediaForm, grade: gradeFilter === 'all' ? '12A3' : gradeFilter, context: 'general'}); setShowAddMedia(true); }} className="flex items-center gap-2 px-3 md:px-4 py-2 md:py-2.5 bg-gradient-to-r from-rose-400 to-rose-500 text-white rounded-full text-[10px] md:text-xs font-bold tracking-widest hover:shadow-lg hover:scale-105 transition-all shadow-md">
                                                <i className="fa-solid fa-camera-retro md:text-lg animate-bounce"></i> Đăng
                                            </button>
                                        )}
                                    </div>
                                </div>
                                {/* Gallery Images */}
                                <div className="flex-1 overflow-y-auto hide-scrollbar pb-10 gallery-3d-container p-2 md:p-4">
                                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8 auto-rows-[160px] md:auto-rows-[220px]">
                                        {(() => {
                                            const filteredGallery = gallery.filter(item => {
                                                const matchContext = item.context === 'general' || !item.context;
                                                const matchType = mediaFilter === 'all' || item.type === mediaFilter;
                                                const matchGrade = gradeFilter === 'all' || item.grade === gradeFilter;
                                                return matchContext && matchType && matchGrade;
                                            });

                                            if (filteredGallery.length === 0 && !showAddMedia) {
                                                return <div className="col-span-full py-20 text-center text-gray-400 font-serif italic text-lg">Chưa có kỷ niệm nào ở mục này...</div>;
                                            }

                                            return filteredGallery.map((item, index) => (
                                                <div key={item.id} draggable={!appSettings.isTimelineLocked && !isGuest ? "true" : "false"} onDragStart={(e) => handleDragStart(e, item)} onDragEnd={handleDragEnd} onDragOver={handleDragOver} onDrop={(e) => handleDrop(e, item)} className={`polaroid-3d tilt-${index % 4} ${item.colSpan} row-span-1 relative group w-full h-full ${!appSettings.isTimelineLocked && !isGuest ? 'cursor-grab active:cursor-grabbing' : 'cursor-pointer'} flex flex-col`}>
                                                    <div className="absolute inset-0 z-20" onClick={() => setSelectedMedia(item)}></div>
                                                    {gradeFilter === 'all' && (
                                                        <div className="absolute top-2 left-2 z-30 bg-white/90 backdrop-blur px-2 py-0.5 rounded-md text-[9px] font-bold text-rose-500 uppercase shadow-sm border border-rose-100">{item.grade || '12A3'}</div>
                                                    )}
                                                    {!appSettings.isTimelineLocked && !isGuest && item.uploaderUid && currentUser?.uid && item.uploaderUid === currentUser.uid && (
                                                        <button onClick={(e) => handleDeleteMedia(e, item.id)} className="absolute top-3 right-3 w-8 h-8 bg-white/80 backdrop-blur hover:bg-rose-600 text-rose-500 hover:text-white rounded-full flex items-center justify-center transition-all shadow-md z-30 opacity-90 md:opacity-0 group-hover:opacity-100 scale-100 hover:scale-110" title="Gỡ ảnh này"><i className="fa-solid fa-trash-can text-[11px]"></i></button>
                                                    )}
                                                    <div className="flex-1 w-full relative overflow-hidden rounded-lg bg-gray-100 pointer-events-none">
                                                        {item.type === 'image' ? <img src={item.url} alt="Kỷ niệm" className="w-full h-full object-cover" /> : (
                                                            <div className="w-full h-full bg-gray-900 flex items-center justify-center relative">
                                                                <img src={item.url} className="absolute inset-0 w-full h-full object-cover opacity-60 blur-[2px]" onError={(e) => e.target.style.display = 'none'}/>
                                                                <div className="w-12 h-12 bg-white/30 backdrop-blur-md rounded-full flex items-center justify-center relative z-10 text-white shadow-lg border border-white/50"><i className="fa-solid fa-play ml-1"></i></div>
                                                            </div>
                                                        )}
                                                    </div>
                                                    <div className="absolute -top-3 left-1/2 transform -translate-x-1/2 w-6 h-6 bg-red-400 rounded-full shadow-[inset_-2px_-2px_4px_rgba(0,0,0,0.3),2px_2px_4px_rgba(0,0,0,0.2)] z-10"><div className="absolute top-1 left-1 w-2 h-2 bg-white/50 rounded-full"></div></div>

                                    </div>
                                </div>
                            </div>

                        {/* SLIDE 4 & 5 ... */}

                                {/* HTML cũ phần Timeline ... */}
                                <div className="text-center mb-10 relative z-10 shrink-0">
                                    <h2 className="text-4xl md:text-5xl font-serif text-gray-800 mb-2">Hành Trình</h2>
                                    <p className="text-gray-500 text-xs tracking-widest uppercase mb-6">Chuyến tàu thanh xuân 10 - 12</p>
                                    
                                    <div className="flex justify-center gap-3">
                                        <button onClick={() => { setTheaterModeType('journey'); setIsTheaterMode(true); }} className="px-5 py-2.5 bg-gray-900 text-white rounded-full text-xs font-bold tracking-widest shadow-lg hover:-translate-y-1 transition-transform flex items-center gap-2">
                                            <i className="fa-solid fa-backward-fast text-rose-400"></i> Tua lại Ký Ức
                                        </button>
                                        
                                        {!appSettings.isTimelineLocked && !isGuest && (
                                            <button onClick={handleLockTimeline} className="px-5 py-2.5 bg-white border border-rose-200 text-rose-500 rounded-full text-xs font-bold tracking-widest shadow-sm hover:bg-rose-50 transition-colors flex items-center gap-2">
                                                <i className="fa-solid fa-lock"></i> Chốt Vĩnh Viễn
                                            </button>
                                        )}
                                    </div>
                                </div>
                                <div className="flex flex-col gap-12 pb-12">
                                    {TIMELINE_STAGES.map((stage, index) => {
                                        const stageImages = gallery.filter(item => item.grade === stage.id && item.context === 'journey').sort((a,b) => b.createdAt - a.createdAt);
                                        return (
                                            <div key={stage.id} className="glass p-6 md:p-8 rounded-[2.5rem] shadow-sm relative group overflow-hidden border border-white/60">
                                                <div className={`absolute -right-10 -top-10 w-40 h-40 rounded-full opacity-20 blur-2xl pointer-events-none transition-transform group-hover:scale-150 duration-700 ${stage.bg.replace('bg-', 'bg-')} bg-current`}></div>
                                                <div className="flex flex-col md:flex-row md:items-end justify-between mb-6 border-b border-gray-200/60 pb-4 relative z-10">
                                                    <div>
                                                        <div className="flex items-center gap-3 mb-2">
                                                            <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-xl shadow-inner ${stage.bg} ${stage.color}`}><i className={`fa-solid ${stage.icon}`}></i></div>
                                                            <div>
                                                                <span className={`text-[10px] font-bold uppercase tracking-wider ${stage.color} opacity-80`}>{stage.year}</span>
                                                                <h3 className="text-2xl md:text-3xl font-serif text-gray-800">{stage.title} <span className="text-gray-400 font-sans text-lg md:text-xl font-light">| {stage.id}</span></h3>
                                                            </div>
                                                        </div>
                                                        <p className="text-sm text-gray-500 max-w-2xl mt-2 italic">{stage.desc}</p>
                                                    </div>
                                                    {!appSettings.isTimelineLocked && !isGuest && (
                                                        <button onClick={() => { setMediaForm({...mediaForm, grade: stage.id, context: 'journey', type: 'image', url: ''}); setShowAddMedia(true); }} className="mt-4 md:mt-0 px-5 py-2.5 bg-white border border-dashed border-rose-300 text-rose-500 rounded-xl text-xs font-bold hover:bg-rose-50 transition-colors shadow-sm flex items-center justify-center gap-2 hover:scale-105 shrink-0"><i className="fa-solid fa-plus"></i> Góp ký ức {stage.id}</button>
                                                    )}
                                                </div>
                                                <div className="gallery-3d-container">
                                                    {stageImages.length > 0 ? (
                                                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6 auto-rows-[160px] md:auto-rows-[200px]">
                                                            {stageImages.map((item, idx) => (
                                                                <div key={item.id} draggable={!appSettings.isTimelineLocked && !isGuest ? "true" : "false"} onDragStart={(e) => handleDragStart(e, item)} onDragEnd={handleDragEnd} onDragOver={handleDragOver} onDrop={(e) => handleDrop(e, item)} className={`polaroid-3d tilt-${idx % 4} ${item.colSpan} row-span-1 relative group w-full h-full ${!appSettings.isTimelineLocked && !isGuest ? 'cursor-grab active:cursor-grabbing' : 'cursor-pointer'} flex flex-col`}>
                                                                    <div className="absolute inset-0 z-20" onClick={() => setSelectedMedia(item)}></div>
                                                                    {!appSettings.isTimelineLocked && !isGuest && item.uploaderUid && currentUser?.uid && item.uploaderUid === currentUser.uid && (
                                                                        <button onClick={(e) => handleDeleteMedia(e, item.id)} className="absolute top-3 right-3 w-8 h-8 bg-white/80 backdrop-blur hover:bg-rose-600 text-rose-500 hover:text-white rounded-full flex items-center justify-center transition-all shadow-md z-30 opacity-90 md:opacity-0 group-hover:opacity-100 scale-100 hover:scale-110" title="Gỡ ảnh này"><i className="fa-solid fa-trash-can text-[11px]"></i></button>
                                                                    )}
                                                                    <div className="flex-1 w-full relative overflow-hidden rounded-lg bg-gray-100 pointer-events-none border border-black/5">
                                                                        {item.type === 'image' ? <img src={item.url} alt="Kỷ niệm" className="w-full h-full object-cover" /> : (
                                                                            <div className="w-full h-full bg-gray-900 flex items-center justify-center relative"><img src={item.url} className="absolute inset-0 w-full h-full object-cover opacity-60 blur-[2px]" onError={(e) => e.target.style.display = 'none'}/><div className="w-12 h-12 bg-white/30 backdrop-blur-md rounded-full flex items-center justify-center relative z-10 text-white shadow-lg border border-white/50"><i className="fa-solid fa-play ml-1"></i></div></div>
                                                                        )}
                                                                    </div>
                                                                    <div className="absolute -top-3 left-1/2 transform -translate-x-1/2 w-6 h-6 bg-red-400 rounded-full shadow-[inset_-2px_-2px_4px_rgba(0,0,0,0.3),2px_2px_4px_rgba(0,0,0,0.2)] z-10"><div className="absolute top-1 left-1 w-2 h-2 bg-white/50 rounded-full"></div></div>
                                                                    <div className="absolute bottom-2 left-0 w-full text-center px-2 pointer-events-none"><span className="font-cursive text-gray-500 text-sm opacity-80 truncate block">{item.caption || (item.type === 'video' ? 'Video' : 'Memory')}</span></div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    ) : (
                                                        <div className="w-full py-16 flex flex-col items-center justify-center border-2 border-dashed border-rose-200 rounded-2xl text-rose-400 bg-white/40">
                                                            <i className="fa-solid fa-images text-4xl mb-3 opacity-60"></i><p className="text-sm font-sans uppercase tracking-widest font-semibold">Chưa có ký ức nào</p><p className="text-xs mt-1 font-serif text-gray-500 italic">Hãy là người đầu tiên đóng góp cho năm {stage.id}!</p>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        <div style={getSlideStyle(5)} className="w-full h-full flex items-center justify-center px-4 md:px-6 relative overflow-hidden">
                            <div className="absolute inset-0 pointer-events-none overflow-hidden opacity-40">
                                {members.filter(m => m.quote && m.quote !== 'Thanh xuân như một cơn mưa rào...').slice(0, 15).map((member, i) => {
                                    const top = `${Math.floor(Math.random() * 80) + 10}%`, left = `${Math.floor(Math.random() * 80) + 10}%`, animationDuration = `${Math.floor(Math.random() * 10) + 15}s`, animationDelay = `-${Math.floor(Math.random() * 10)}s`, rotate = `rotate(${Math.floor(Math.random() * 40) - 20}deg)`;
                                    return <div key={i} className="absolute font-cursive text-gray-500 text-lg md:text-2xl whitespace-nowrap animate-pulse" style={{ top, left, transform: rotate, animation: `float ${animationDuration} ease-in-out infinite alternate`, animationDelay }}>{member.name.split(' ').pop()}: "{member.quote.length > 30 ? member.quote.substring(0, 30) + '...' : member.quote}"</div>
                                })}
                            </div>
                            <style dangerouslySetInnerHTML={{__html: `@keyframes float { 0% { transform: translateY(0px) rotate(-5deg); opacity: 0.3; } 50% { opacity: 0.8; } 100% { transform: translateY(-30px) rotate(5deg); opacity: 0.3; } }`}} />

                            <div className="max-w-3xl w-full z-10">
                                <div className="glass p-8 md:p-12 rounded-[2.5rem] shadow-2xl border border-white/60 relative group hover:border-rose-200 transition-colors duration-700">
                                    <div className="absolute -top-6 -right-6 w-20 h-20 bg-rose-500 rounded-full flex items-center justify-center text-white shadow-lg transform rotate-12 group-hover:rotate-0 transition-transform duration-500 border-4 border-white">
                                        <div className="text-center"><span className="block text-[10px] uppercase font-bold tracking-widest border-b border-white/50 pb-0.5 mb-0.5">Class of</span><span className="block font-serif text-xl">2026</span></div>
                                    </div>
                                    <div className="text-center">
                                        <i className="fa-solid fa-paper-plane text-4xl text-rose-300 mb-6 group-hover:-translate-y-2 group-hover:translate-x-2 transition-transform duration-500"></i>
                                        <h2 className="text-4xl md:text-5xl font-serif text-gray-800 mb-6 leading-tight">Trạm Cuối: <br/><span className="text-rose-500 font-cursive text-5xl md:text-6xl block mt-2">Trưởng Thành</span></h2>
                                        <div className="w-16 h-px bg-rose-200 mx-auto mb-6"></div>
                                        <p className="font-serif italic text-lg md:text-xl text-gray-600 leading-relaxed mb-8">"Chuyến tàu mang tên thanh xuân không có vé khứ hồi. Cảm ơn 49 mảnh ghép đã cùng nhau tạo nên một 12A3 rực rỡ nhất. Tạm biệt nhé, những năm tháng đẹp nhất cuộc đời..."</p>
                                        <div className="flex flex-col md:flex-row items-center justify-center gap-4 mt-8">
                                            <button onClick={() => setCurrentSlide(0)} className="px-6 py-3 bg-gray-900 text-white rounded-full text-xs font-bold uppercase tracking-widest hover:bg-rose-500 transition-colors shadow-lg flex items-center gap-2"><i className="fa-solid fa-rotate-left"></i> Xem lại từ đầu</button>
                                            <a href="https://www.facebook.com/share/1CP9V3S9Hq/" target="_blank" className="px-6 py-3 bg-white text-gray-800 border border-gray-200 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-gray-50 transition-colors shadow-sm flex items-center gap-2"><i className="fa-brands fa-facebook text-blue-500"></i> Group Lớp</a>
                                        </div>
                                    </div>
                                </div>
                                <p className="text-center mt-6 text-[10px] uppercase tracking-widest text-gray-400 font-medium">Được lưu trữ vĩnh viễn trong mỗi người <i className="fa-solid fa-cloud text-rose-300 ml-1"></i></p>
                            </div>
                        </div>
                    </div>

                    {/* MAIN POPUP: XEM THÔNG TIN VÀ LƯU BÚT */}
                    {selectedMember && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-3 md:p-6">
                            <div className="absolute inset-0 bg-black/40 backdrop-blur-md animate-fadeIn" onClick={() => { 
                                setSelectedMember(null); 
                                setIsEditing(false); 
                                if(tutorialStep > 0) setTutorialStep(0); // Tắt tutorial nếu user tắt form
                            }}></div>
                            
                            <div className="relative w-full max-w-5xl bg-white rounded-[2rem] shadow-2xl overflow-hidden flex flex-col md:flex-row h-[90dvh] md:h-[650px] z-[101] border border-white/20 animate-slideUp">
                                
                                <button onClick={() => { setSelectedMember(null); setIsEditing(false); if(tutorialStep>0) setTutorialStep(0); }} className="absolute top-4 right-4 text-gray-400 hover:text-gray-800 bg-gray-100/80 backdrop-blur rounded-full w-8 h-8 flex items-center justify-center z-[110] transition-transform hover:scale-110"><i className="fa-solid fa-xmark"></i></button>

                                {/* LEFT SIDE: PROFILE INFO */}
                                <div className={`w-full md:w-5/12 p-4 md:p-10 flex flex-col items-center relative overflow-y-auto hide-scrollbar shrink-0 h-[45%] md:h-full ${(!isEditing || isMobile) ? (PROFILE_THEMES.find(t=>t.id===selectedMember.theme)?.light || 'bg-rose-50') : 'bg-gray-50'} transition-colors duration-500 border-b md:border-b-0 md:border-r border-white/50`}>
                                    {(!isEditing || isMobile) ? (
                                        <>
                                            <div className={`w-24 h-24 md:w-36 md:h-36 mt-4 rounded-full p-1.5 mb-3 md:mb-6 shadow-xl ${PROFILE_THEMES.find(t=>t.id===selectedMember.theme)?.bg || 'bg-rose-400'} bg-opacity-20 shrink-0 transition-transform hover:scale-105 duration-300`}>
                                                <div className="w-full h-full rounded-full overflow-hidden border-2 border-white bg-white">
                                                    <img src={selectedMember.avatar} alt="Avatar" className="w-full h-full object-cover" />
                                                </div>
                                            </div>
                                            <h3 className="font-serif text-xl md:text-3xl text-center mb-1 md:mb-2 font-medium text-gray-800">{selectedMember.name}</h3>
                                            <div className="px-3 py-1 rounded-full bg-white/60 text-[9px] md:text-xs uppercase tracking-widest font-semibold text-gray-600 mb-4 md:mb-6 shadow-sm border border-white shrink-0">{selectedMember.role}</div>
                                            
                                            <div className="relative text-center px-4 w-full max-w-[280px]">
                                                <i className={`fa-solid fa-quote-left absolute -top-3 -left-1 text-2xl opacity-20 text-gray-800`}></i>
                                                <p className="font-cursive text-lg md:text-2xl text-gray-700 leading-snug">"{selectedMember.quote}"</p>
                                            </div>

                                            <div className="flex gap-4 mt-4 md:mt-6 justify-center w-full shrink-0">
                                                {selectedMember.facebook && <a href={formatSocialLink(selectedMember.facebook, 'facebook')} target="_blank" className="text-blue-500 text-xl md:text-2xl hover:scale-125 transition-transform"><i className="fa-brands fa-facebook"></i></a>}
                                                {selectedMember.instagram && <a href={formatSocialLink(selectedMember.instagram, 'instagram')} target="_blank" className="text-pink-500 text-xl md:text-2xl hover:scale-125 transition-transform"><i className="fa-brands fa-instagram"></i></a>}
                                                {selectedMember.tiktok && <a href={formatSocialLink(selectedMember.tiktok, 'tiktok')} target="_blank" className="text-gray-800 text-xl md:text-2xl hover:scale-125 transition-transform"><i className="fa-brands fa-tiktok"></i></a>}
                                            </div>
                                            
                                            <div className="mt-auto pt-4 md:pt-6 flex flex-col gap-2 w-full pb-2 shrink-0">
                                                {!isGuest ? (
                                                    !selectedMember.isLocked ? (
                                                        <button 
                                                            onClick={() => { 
                                                                setIsEditing(true); 
                                                                if (tutorialStep === 2) setTimeout(() => setTutorialStep(3), 300); // Chuyển sang bước 3
                                                            }} 
                                                            className={`w-full py-2 md:py-2.5 rounded-xl bg-white/50 text-gray-600 text-[10px] md:text-xs font-semibold uppercase tracking-widest hover:bg-white transition-all shadow-sm flex items-center justify-center gap-2 hover:shadow-md ${tutorialStep === 2 ? 'tutorial-highlight scale-105' : ''}`}
                                                        >
                                                            <i className="fa-solid fa-pen"></i> Sửa hồ sơ
                                                        </button>
                                                    ) : (
                                                        <div className="w-full py-2 md:py-2.5 rounded-xl bg-gray-100 text-rose-500 text-[10px] md:text-xs font-medium uppercase tracking-widest flex items-center justify-center gap-2">
                                                            <i className="fa-solid fa-lock"></i> Đã niêm phong
                                                        </div>
                                                    )
                                                ) : (
                                                    <div className="w-full py-2 md:py-2.5 rounded-xl border-2 border-dashed border-gray-200 text-gray-400 text-[10px] md:text-xs font-medium uppercase tracking-widest flex items-center justify-center gap-2">
                                                        <i className="fa-solid fa-eye"></i> Chế độ xem
                                                    </div>
                                                )}
                                            </div>
                                        </>
                                    ) : (
                                        renderEditForm()
                                    )}
                                </div>

                                {/* RIGHT SIDE: GUESTBOOK WALL */}
                                <div className="w-full md:w-7/12 flex flex-col h-[55%] md:h-full shrink-0 bg-white relative">
                                    <div className="px-4 md:px-5 py-3 md:py-4 border-b border-gray-100 flex items-center gap-3 bg-white/80 backdrop-blur z-10 shrink-0">
                                        <div className="w-7 h-7 md:w-8 md:h-8 rounded-full bg-rose-50 flex items-center justify-center text-rose-400"><i className="fa-regular fa-message text-[10px] md:text-sm"></i></div>
                                        <div>
                                            <h4 className="font-sans font-semibold text-xs md:text-sm text-gray-800 leading-tight">Tường Nhà</h4>
                                            <p className="text-[8px] md:text-[9px] text-gray-400 uppercase tracking-widest">Gửi gắm cho {(selectedMember.name || 'Bạn').split(' ').pop()}</p>
                                        </div>
                                    </div>

                                    <div className="flex-1 overflow-y-auto hide-scrollbar p-3 md:p-6 space-y-3 md:space-y-4 bg-gray-50/50 relative">
                                        {!selectedMember.messages || selectedMember.messages.length === 0 ? (
                                            <div className="absolute inset-0 flex flex-col items-center justify-center text-gray-300 text-center pointer-events-none">
                                                <i className="fa-solid fa-envelope-open-text text-3xl md:text-4xl mb-2 md:mb-3 opacity-50"></i>
                                                <p className="font-cursive text-lg md:text-xl text-gray-400">Chưa có lời nhắn nào...</p>
                                            </div>
                                        ) : (
                                            selectedMember.messages.map(msg => (
                                                <div key={msg.id} className="bg-white p-3 md:p-4 rounded-2xl shadow-sm border border-gray-100 relative group transition-colors hover:shadow-md animate-slideUp">
                                                    <p className="font-cursive text-lg md:text-xl text-gray-700 mb-2 md:mb-3 leading-relaxed">"{msg.content}"</p>
                                                    <div className="flex justify-between items-center mt-2 pt-2 border-t border-gray-50">
                                                        <span className="text-[10px] md:text-[11px] font-semibold text-gray-600 flex items-center gap-1.5"><i className="fa-solid fa-user-pen text-gray-300"></i> {msg.author}</span>
                                                        <span className="text-[8px] md:text-[9px] text-gray-400">{msg.date}</span>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>

                                    <div className="p-3 md:p-5 border-t border-gray-100 bg-white shrink-0">
                                        {!isGuest ? (
                                            <form onSubmit={handleLeaveMessage} className="flex flex-col gap-2">
                                                <div className="flex gap-2 items-center">
                                                    <div className="w-8 h-8 md:w-10 md:h-10 rounded-xl bg-gray-100 flex items-center justify-center text-gray-400 shrink-0"><i className="fa-solid fa-signature text-xs md:text-base"></i></div>
                                                    <input name="author" type="text" placeholder="Tên của bạn..." required className="flex-1 bg-gray-50 border border-gray-100 rounded-xl px-3 py-2 text-xs md:text-sm outline-none focus:border-rose-300 transition-colors shadow-inner" />
                                                </div>
                                                <div className="flex gap-2 items-end">
                                                    <textarea name="content" rows="2" placeholder="Viết gì đó..." required className="flex-1 bg-gray-50 border border-gray-100 rounded-xl p-2 md:p-3 text-xs md:text-sm outline-none focus:border-rose-300 transition-colors resize-none font-serif shadow-inner" />
                                                    <button type="submit" disabled={isUploading} className="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-rose-500 text-white flex items-center justify-center hover:bg-rose-600 transition-transform active:scale-95 disabled:opacity-50 shrink-0 shadow-md shadow-rose-200">
                                                        {isUploading ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-paper-plane text-xs md:text-sm"></i>}
                                                    </button>
                                                </div>
                                            </form>
                                        ) : (
                                            <div className="bg-gray-50 rounded-xl p-4 text-center border border-gray-100">
                                                <p className="text-[10px] md:text-xs text-gray-400 uppercase tracking-widest font-semibold"><i className="fa-solid fa-lock text-rose-300 mr-1"></i> Chế độ Khách tham quan</p>
                                                <p className="text-xs md:text-sm text-gray-500 font-serif italic mt-1">Chỉ thành viên lớp mới có thể để lại lời nhắn.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MOBILE EDIT POPUP (BOTTOM SHEET) */}
                    {(isEditing && isMobile && selectedMember) && (
                        <div className="fixed inset-0 z-[200] flex items-end justify-center md:hidden">
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm animate-fadeIn" onClick={() => setIsEditing(false)}></div>
                            <div className="relative w-full bg-white rounded-t-[2rem] shadow-2xl z-[201] animate-slideUp flex flex-col pt-3 pb-6 px-5" style={{ maxHeight: '90dvh' }}>
                                <div className="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-3 shrink-0"></div>
                                <button onClick={() => setIsEditing(false)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-800 bg-gray-100 rounded-full w-8 h-8 flex items-center justify-center z-[210]"><i className="fa-solid fa-xmark"></i></button>
                                {renderEditForm()}
                            </div>
                        </div>
                    )}

                    {/* MODAL: TRA CỨU SỐ THỨ TỰ */}
                    {showMemberList && (
                        <div className="fixed inset-0 z-[400] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm animate-fadeIn">
                            <div className="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden flex flex-col max-h-[80vh] md:max-h-[70vh] animate-slideUp relative border border-white/50">
                                <div className="p-4 md:p-5 border-b border-gray-100 bg-gray-50 flex justify-between items-center shrink-0">
                                    <div>
                                        <h3 className="font-serif text-lg font-bold text-gray-800">Sĩ số lớp 12A3</h3>
                                        <p className="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Tìm số hiệu của bạn</p>
                                    </div>
                                    <button onClick={() => setShowMemberList(false)} className="w-8 h-8 rounded-full bg-white border border-gray-200 text-gray-500 hover:text-rose-500 hover:border-rose-200 shadow-sm flex items-center justify-center transition-transform hover:scale-110"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div className="overflow-y-auto p-4 space-y-1 hide-scrollbar">
                                    {DEFAULT_CLASS_LIST.map((mem, i) => (
                                        <div key={i} className={`flex items-center justify-between p-2.5 hover:bg-rose-50 rounded-xl transition-colors border border-transparent hover:border-rose-100 cursor-pointer ${tutorialStep === 1 && i === 0 ? 'tutorial-highlight' : ''}`} onClick={() => {
                                            setShowMemberList(false);
                                            setCurrentSlide(2);
                                            const found = members.find(m => m.id === `member_${i+1}`);
                                            if(found) {
                                                setSelectedMember(found);
                                                setEditForm(found);
                                                setIsEditing(false);
                                                if(tutorialStep === 1) setTimeout(() => setTutorialStep(2), 300);
                                            }
                                        }}>
                                            <span className="text-xs md:text-sm font-medium text-gray-700">
                                                <span className="text-rose-400 font-bold w-6 inline-block">{i + 1}.</span> {mem.name}
                                            </span>
                                            {mem.role !== 'Thành viên' && (
                                                <span className="text-[9px] bg-rose-100 text-rose-600 px-2 py-1 rounded-full uppercase font-bold tracking-wider">{mem.role}</span>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
