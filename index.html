    <style>
        body { background-color: #fafafa; overflow: hidden; color: #333; margin: 0; padding: 0; }
        
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes slideUp {
            from { transform: translateY(60px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .animate-slideUp { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes kenburns {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.15) translate(-1%, -1%); }
        }
        .animate-kenburns { animation: kenburns 8s ease-out forwards; }
        .animate-kenburns-slow { animation: kenburns 25s ease-in-out infinite alternate; }

        @keyframes titleReveal {
            0% { transform: scale(0.9); opacity: 0; letter-spacing: 0.1em; }
            15% { opacity: 1; }
            85% { opacity: 1; transform: scale(1.05); letter-spacing: 0.25em; }
            100% { transform: scale(1.1); opacity: 0; letter-spacing: 0.3em; }
        }
        .animate-titleReveal { animation: titleReveal 3.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        @keyframes textReveal {
            0% { transform: translateY(25px); opacity: 0; }
            15% { transform: translateY(0); opacity: 1; }
            85% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-25px); opacity: 0; }
        }
        .animate-textReveal { animation: textReveal 5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }

        .vignette-overlay {
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
            pointer-events: none;
        }
        
        .gallery-3d-container { perspective: 1200px; transform-style: preserve-3d; }
        
        .polaroid-3d {
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
            background: white;
            padding: 8px 8px 26px 8px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        
        .polaroid-3d:hover {
            transform: translateY(-15px) translateZ(60px) rotate(0deg) scale(1.05) !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3), 0 0 20px rgba(244, 63, 94, 0.2);
            z-index: 40;
        }
        
        .dragging { opacity: 0.5; transform: scale(0.95) !important; box-shadow: none !important; }
        
        .tilt-0 { transform: rotate(-4deg); }
        .tilt-1 { transform: rotate(3deg); }
        .tilt-2 { transform: rotate(-2deg); }
        .tilt-3 { transform: rotate(4deg); }

        /* Hiệu ứng nổi bật cho Tutorial */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(250, 204, 21, 0); }
            100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); }
        }
        .tutorial-highlight {
            animation: pulse-ring 2s infinite;
            border-radius: inherit;
            position: relative;
            z-index: 1001 !important;
            background-color: white;
        }
    </style>

    <script type="text/babel">

        const PROFILE_THEMES = [

            { id: 'lavender', bg: 'bg-purple-400', light: 'bg-purple-50' },

            { name: "Lê Thị Trà My", role: "Thành viên" }, { name: "Đỗ Ngọc Phương Nhi", role: "Thành viên" },
            { name: "Trần Đăng Quang", role: "Thành viên" }, { name: "Nguyễn Anh Quân", role: "Thành viên" },
            { name: "Phạm Hoàng Quân", role: "Thành viên" }, { name: "Nguyễn Thị Phương Thảo", role: "Thành viên" },
            { name: "Cao Chí Thiên", role: "Thành viên" }, { name: "Trần Minh Nhựt Thiên", role: "Thành viên" },
            { name: "Lương Thị Anh Thư", role: "Lớp Phó" }, { name: "Ngô Quỳnh Thư", role: "Thành viên" },
            { name: "Nguyễn Trần Thanh Thư", role: "Thành viên" }, { name: "Vũ Ngọc Minh Thy", role: "Thành viên" },
            { name: "Nguyễn Trần Phương Trinh", role: "Thủ Quỹ" }, { name: "Phạm Hoàng Anh Tú", role: "Thành viên" },
            { name: "Phạm Tuân", role: "Thành viên" }, { name: "Trần Cao Anh Tuấn", role: "Thành viên" },
            { name: "Trương Hoàng Phương Uyên", role: "Thành viên" }, { name: "Sung Vĩnh Văn", role: "Thành viên" },
            { name: "Nguyễn Sĩ Việt", role: "Thành viên" }, { name: "Châu Nguyễn Tường Vy", role: "Thành viên" },
            { name: "Nguyễn Ngọc Như Ý", role: "Thành viên" }, { name: "Nguyễn Huỳnh Hải Yến", role: "Thành viên" },
            { name: "Nguyễn Phương Thảo", role: "Thành viên" }
        ];

        const TIMELINE_STAGES = [
            { id: '10A3', year: 'Năm học 2023 - 2024', title: 'Khởi Đầu Bỡ Ngỡ', desc: 'Những ánh mắt rụt rè, những câu chào ngập ngừng ngày đầu tiên bước vào cấp 3. Mọi thứ đều mới mẻ...', icon: 'fa-seedling', color: 'text-emerald-500', bg: 'bg-emerald-100', journeyTitle: "CÙNG ĐẾN VỚI LỚP 10A3" },
            { id: '11A3', year: 'Năm học 2024 - 2025', title: 'Gắn Kết & Nổi Loạn', desc: 'Đã quá quen thuộc với nhau. Những trò quậy phá, những lần trốn học bài, tình bạn tuổi 17 rực rỡ nhất.', icon: 'fa-fire-flame-curved', color: 'text-orange-500', bg: 'bg-orange-100', journeyTitle: "TIẾP THEO LÀ 11A3" },
            { id: '12A3', year: 'Năm học 2025 - 2026', title: 'Trưởng Thành & Chia Xa', desc: 'Áp lực thi cử chồng chất, những trang lưu bút viết vội. Bắt đầu đếm ngược những ngày còn được ở bên nhau.', icon: 'fa-graduation-cap', color: 'text-rose-500', bg: 'bg-rose-100', journeyTitle: "CUỐI CÙNG LÀ 12A3" }
        ];

        const App = () => {
            // Khôi phục vị trí trang từ localStorage (Tránh việc F5 bị mất dấu)
            const savedSlide = parseInt(localStorage.getItem('kyyeu_currentSlide')) || 0;
            const [currentSlide, setCurrentSlide] = useState(savedSlide);
            const totalSlides = 6; 

            // Cập nhật localStorage mỗi khi đổi Slide
            useEffect(() => {
                localStorage.setItem('kyyeu_currentSlide', currentSlide);
            }, [currentSlide]);

            // STATE PHÂN QUYỀN (null: chưa chọn, 'member': thành viên, 'guest': khách)
            const [userRole, setUserRole] = useState(localStorage.getItem('kyyeu_userRole') || null);
            const isGuest = userRole === 'guest';
            
            // XÁC THỰC THÀNH VIÊN
            const [showAuthModal, setShowAuthModal] = useState(false);
            const [authPassword, setAuthPassword] = useState('');
            const [authAttempts, setAuthAttempts] = useState(0);
            const [authError, setAuthError] = useState('');
            
            // THÊM STATE CHO TUTORIAL (GAME MODE)
            // 0: Tắt, 1: Tìm người, 2: Bấm sửa, 3: Đổi thông tin, 4: Lưu
            const [tutorialStep, setTutorialStep] = useState(0);

            const [touchStart, setTouchStart] = useState(null);
            const [touchEnd, setTouchEnd] = useState(null);
            
            const [currentUser, setCurrentUser] = useState(null); 
            const [members, setMembers] = useState([]);
            const [gallery, setGallery] = useState([]);
            const [appSettings, setAppSettings] = useState({ isTimelineLocked: false });
            
            const [selectedMember, setSelectedMember] = useState(null);
            const [isEditing, setIsEditing] = useState(false);
            const [editForm, setEditForm] = useState({});
            const [showFirebaseError, setShowFirebaseError] = useState(false);
            const [customDialog, setCustomDialog] = useState(null); 
            
            const [showAddMedia, setShowAddMedia] = useState(false);
            const [mediaForm, setMediaForm] = useState({ type: 'image', url: '', caption: '', grade: '12A3', context: 'general' });
            
            const [gradeFilter, setGradeFilter] = useState('all'); 
            const [isUploading, setIsUploading] = useState(false);
            const [selectedMedia, setSelectedMedia] = useState(null); 
            const [mediaFilter, setMediaFilter] = useState('all'); 
            
            const [isTheaterMode, setIsTheaterMode] = useState(false);
            const [theaterModeType, setTheaterModeType] = useState('normal'); 
            const [theaterCurrentIndex, setTheaterCurrentIndex] = useState(0);
            
            const [showMemberList, setShowMemberList] = useState(false);
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            
            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const appId = 'cd12a3';

            const getEmbedUrl = (url) => {
                if (!url || typeof url !== 'string') return '';
                if (url.includes('drive.google.com/file/d/')) return url.replace('/view', '/preview');
                let videoId = '';
                if (url.includes('youtube.com/watch?v=')) videoId = url.split('v=')[1]?.split('&')[0];
                else if (url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1]?.split('?')[0];
                return videoId ? `https://www.youtube.com/embed/${videoId}` : url;
            };

            // Hàm xử lý các Link Mạng xã hội cho chính xác (Bất chấp nhập link tắt như @username)
            const formatSocialLink = (link, platform) => {
                if (!link) return '#';
                let formatted = link.trim();
                if (formatted.startsWith('http://') || formatted.startsWith('https://')) return formatted;
                if (platform === 'tiktok') {
                    if (formatted.startsWith('@')) return `https://www.tiktok.com/${formatted}`;
                    if (formatted.includes('tiktok.com')) return `https://${formatted}`;
                    return `https://www.tiktok.com/@${formatted}`;
                }
                if (platform === 'instagram') {
                    if (formatted.startsWith('@')) return `https://www.instagram.com/${formatted.substring(1)}`;
                    if (formatted.includes('instagram.com')) return `https://${formatted}`;
                    return `https://www.instagram.com/${formatted}`;
                }
                if (platform === 'facebook') {
                    if (formatted.includes('facebook.com') || formatted.includes('fb.com')) return `https://${formatted}`;
                    return `https://www.facebook.com/${formatted}`;
                }
                return `https://${formatted}`;
            };

            useEffect(() => {
                if (!userRole) return; // Không connect Firebase nếu chưa chọn Role để tối ưu
                const initTimer = setTimeout(async () => {
                    const { collection, onSnapshot, signInAnonymously, doc } = window.firebaseHooks;
                    const db = window.firebaseDB;
                    const auth = window.firebaseAuth;

                    try {
                        try {
                            const userCred = await signInAnonymously(auth);
                            setCurrentUser(userCred.user);
                        } catch (authErr) {
                            setShowFirebaseError(true);
                        }

                        const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'app_settings', 'config');
                        const unsubSettings = onSnapshot(settingsRef, (docSnap) => {
                            if (docSnap.exists()) setAppSettings(docSnap.data());
                        });

                        const membersRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
                        const unsubMembers = onSnapshot(membersRef, (snapshot) => {
                            let dbMembers = [];
                            snapshot.forEach((doc) => dbMembers.push({ id: doc.id, ...doc.data() }));

                            const mergedMembers = Array.from({ length: 49 }, (_, i) => {
                                const id = `member_${i+1}`;
                                const found = dbMembers.find(m => m.id === id);
                                const defaultInfo = DEFAULT_CLASS_LIST[i] || { name: `Thành viên ${i+1}`, role: 'Thành viên' };
                                return found || {
                                    id, name: defaultInfo.name, role: defaultInfo.role,
                                    avatar: `https://api.dicebear.com/7.x/notionists/svg?seed=12A3_${i + 1}&backgroundColor=ffe4e6`,
                                    quote: 'Thanh xuân như một cơn mưa rào...', facebook: '', instagram: '', tiktok: '', isLocked: false, theme: 'rose', messages: []
                                };
                            });
                            setMembers(mergedMembers);
                            
                            if (selectedMember) {
                                const updatedSelected = mergedMembers.find(m => m.id === selectedMember.id);
                                if (updatedSelected) setSelectedMember(updatedSelected);
                            }
                        }, (error) => setShowFirebaseError(true));

                        const galleryRef = collection(db, 'artifacts', appId, 'public', 'data', 'gallery');
                        const unsubGallery = onSnapshot(galleryRef, (snapshot) => {
                            let dbGallery = [];
                            snapshot.forEach((doc) => dbGallery.push({ id: doc.id, ...doc.data() }));
                            setGallery(dbGallery.sort((a, b) => b.createdAt - a.createdAt));
                        });
                        
                        return () => { unsubMembers(); unsubGallery(); unsubSettings(); };
                    } catch (err) { console.error("Error:", err); }
                }, 500); 
                return () => clearTimeout(initTimer);
            }, [selectedMember?.id, userRole]);


            const presentationItems = useMemo(() => {
                if (theaterModeType === 'journey') {
                    let sequence = [];
                    TIMELINE_STAGES.forEach(stage => {
                        const items = gallery.filter(item => item.grade === stage.id && item.context === 'journey').sort((a,b) => a.createdAt - b.createdAt);
                        sequence.push({ id: `title_card_${stage.id}`, type: 'titleCard', title: stage.journeyTitle });
                        if (items.length > 0) sequence.push(...items);
                        else sequence.push({ id: `placeholder_${stage.id}`, type: 'endingCard', title: `Chưa có khoảnh khắc nào của chặng đường ${stage.id} được gửi lên.` });
                    });
                    sequence.push({ id: 'ending_card', type: 'endingCard', title: "Chúc các bạn dồi dào sức khỏe, luôn hạnh phúc và gặt hái nhiều thành công." });
                    return sequence;
                } else {
                    return gallery.filter(item => {
                        const matchContext = item.context === 'general' || !item.context;
                        const matchType = mediaFilter === 'all' || item.type === mediaFilter;
                        const matchGrade = gradeFilter === 'all' || item.grade === gradeFilter;
                        return matchContext && matchType && matchGrade;
                    }).sort((a,b) => a.createdAt - b.createdAt);
                }
            }, [gallery, theaterModeType, mediaFilter, gradeFilter]);
            
            useEffect(() => {
                let timer;
                if (isTheaterMode && presentationItems.length > 0) {
                    const currentItem = presentationItems[theaterCurrentIndex];
                    if (currentItem.type === 'endingCard') {
                        if (currentItem.id === 'ending_card') timer = setTimeout(() => { setIsTheaterMode(false); setTheaterCurrentIndex(0); }, 5000);
                        else timer = setTimeout(() => setTheaterCurrentIndex(prev => (prev + 1) % presentationItems.length), 4000);
                    } else if (currentItem.type === 'titleCard') {
                        timer = setTimeout(() => setTheaterCurrentIndex(prev => (prev + 1) % presentationItems.length), 3500); 
                    } else if (currentItem.type === 'image') {
                        timer = setTimeout(() => setTheaterCurrentIndex(prev => (prev + 1) % presentationItems.length), 4500); 
                    }
                } else setTheaterCurrentIndex(0);
                return () => clearTimeout(timer);
            }, [isTheaterMode, presentationItems.length, theaterCurrentIndex]);

            const nextTheaterSlide = () => setTheaterCurrentIndex(prev => (prev + 1) % presentationItems.length);
            const prevTheaterSlide = () => setTheaterCurrentIndex(prev => prev === 0 ? presentationItems.length - 1 : prev - 1);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (isTheaterMode) {
                        if (e.key === 'Escape') setIsTheaterMode(false);
                        if (e.key === 'ArrowRight') nextTheaterSlide();
                        if (e.key === 'ArrowLeft') prevTheaterSlide();
                        return;
                    }
                    if (!userRole || selectedMember || showAddMedia || customDialog || showFirebaseError || selectedMedia || showMemberList || tutorialStep > 0) return; 
                    if (e.key === 'ArrowRight') nextSlide();
                    if (e.key === 'ArrowLeft') prevSlide();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [currentSlide, selectedMember, showAddMedia, customDialog, showFirebaseError, selectedMedia, isTheaterMode, showMemberList, presentationItems.length, tutorialStep, userRole]);

            const nextSlide = () => setCurrentSlide(prev => Math.min(prev + 1, totalSlides - 1));
            const prevSlide = () => setCurrentSlide(prev => Math.max(prev - 1, 0));

            const handleTouchStart = (e) => {
                setTouchEnd(null);
                setTouchStart({ x: e.targetTouches[0].clientX, y: e.targetTouches[0].clientY });
            };
            const handleTouchMove = (e) => setTouchEnd({ x: e.targetTouches[0].clientX, y: e.targetTouches[0].clientY });
            const handleTouchEnd = () => {
                if (!touchStart || !touchEnd || tutorialStep > 0 || !userRole) return; // Không cho vuốt nếu đang chạy Tutorial hoặc chưa đăng nhập
                const distanceX = touchStart.x - touchEnd.x;
                const distanceY = Math.abs(touchStart.y - touchEnd.y);
                if (distanceY < 80) {
                    if (distanceX > 50) nextSlide();
                    if (distanceX < -50) prevSlide();
                }
            };

            const compressImage = (file, callback) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600;
                        let width = img.width, height = img.height;
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        callback(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                };
            };
            
            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) compressImage(file, (compressedBase64) => setEditForm(prev => ({ ...prev, avatar: compressedBase64 })));
            };

            const handleDragStart = (e, item) => { e.dataTransfer.setData('sourceId', item.id); e.dataTransfer.effectAllowed = 'move'; setTimeout(() => e.target.classList.add('dragging'), 0); };
            const handleDragEnd = (e) => e.target.classList.remove('dragging');
            const handleDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };

            const handleDrop = async (e, targetItem) => {
                e.preventDefault();
                if (appSettings.isTimelineLocked || isGuest) return;
                const sourceId = e.dataTransfer.getData('sourceId');
                if (!sourceId || sourceId === targetItem.id) return; 

                const sourceItem = gallery.find(img => img.id === sourceId);
                if (!sourceItem || sourceItem.context !== targetItem.context) return; 

                const { doc, setDoc } = window.firebaseHooks;
                let sTime = sourceItem.createdAt, tTime = targetItem.createdAt;
                if (sTime === tTime) sTime += 1;

                try {
                    await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'gallery', sourceItem.id), { createdAt: tTime, colSpan: targetItem.colSpan }, { merge: true });
                    await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'gallery', targetItem.id), { createdAt: sTime, colSpan: sourceItem.colSpan }, { merge: true });
                } catch (error) { setCustomDialog({ title: "Lỗi", message: "Không thể hoán đổi.", type: "alert" }); }
            };

            const handleLockTimeline = () => {
                if (isGuest) return;
                setCustomDialog({
                    title: "Chốt vĩnh viễn Kỷ Yếu?",
                    message: "Khi chốt, sẽ KHÔNG MỘT AI có thể thêm mới hay xóa ảnh nữa. Bạn chắc chắn chứ?",
                    type: "confirm",
                    onConfirm: async () => {
                        const { doc, setDoc } = window.firebaseHooks;
                        try { await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'app_settings', 'config'), { isTimelineLocked: true }, { merge: true }); } 
                        catch (error) { setCustomDialog({ title: "Lỗi", message: "Không thể khóa.", type: "alert" }); }
                    }
                });
            };

            const handleSaveProfile = async (isLocking = false) => {
                if (isGuest) return;
                if (!editForm.facebook || editForm.facebook.trim() === '') {
                    setCustomDialog({ title: "Thiếu thông tin", message: "Vui lòng nhập Link Facebook của bạn để lớp giữ liên lạc nhé!", type: "alert" });
                    return;
                }
                const { doc, setDoc } = window.firebaseHooks;
                setIsUploading(true);
                try {
                    // CẬP NHẬT: Ghi đè cứng tên gốc từ selectedMember để người dùng không có cách nào sửa tên được (dù cố tình dùng tool)
                    const finalDataToSave = {
                        ...editForm,
                        name: selectedMember.name, 
                        isLocked: isLocking
                    };
                    
                    await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'members', editForm.id), finalDataToSave, { merge: true });
                    setIsEditing(false);
                    // Nếu đang trong Tutorial bước cuối, kết thúc luôn
                    if (tutorialStep === 4) setTutorialStep(0);
                } catch (error) {
                    setCustomDialog({ title: "Lỗi", message: "Không thể lưu.", type: "alert" });
                } finally { setIsUploading(false); }
            };

            const handleLeaveMessage = async (e) => {
                e.preventDefault();
                if (!selectedMember || isGuest) return;
                const author = e.target.author.value.trim(), content = e.target.content.value.trim();
                if (!author || !content) return;
                const { doc, setDoc } = window.firebaseHooks;
                setIsUploading(true);
                try {
                    const newMessage = { id: Date.now(), author, content, date: new Date().toLocaleDateString('vi-VN') };
                    await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'members', selectedMember.id), { messages: [newMessage, ...(selectedMember.messages || [])] }, { merge: true });
                    e.target.reset();
                } catch (error) { setCustomDialog({ title: "Lỗi", message: "Không thể gửi lời nhắn.", type: "alert" }); } 
                finally { setIsUploading(false); }
            };

            const saveMediaToFirebase = async () => {
                if (!mediaForm.url || appSettings.isTimelineLocked || isGuest) return;
                const { collection, addDoc } = window.firebaseHooks;
                setIsUploading(true);
                try {
                    await addDoc(collection(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'gallery'), { 
                        type: mediaForm.type, url: mediaForm.url, caption: mediaForm.caption, 
                        grade: mediaForm.grade, context: mediaForm.context || 'general', 
                        uploaderUid: currentUser?.uid, createdAt: Date.now(), colSpan: Math.random() > 0.6 ? 'col-span-2' : 'col-span-1' 
                    });
                    setShowAddMedia(false);
                    setMediaForm({ type: 'image', url: '', caption: '', grade: '12A3', context: 'general' });
                } catch (error) { setCustomDialog({ title: "Lỗi", message: "Không thể đăng.", type: "alert" }); } 
                finally { setIsUploading(false); }
            };

            const handleDeleteMedia = (e, id) => {
                e.stopPropagation(); 
                if (appSettings.isTimelineLocked || isGuest) return;
                setCustomDialog({
                    title: "Xóa kỷ niệm?", message: "Bạn có chắc chắn muốn gỡ bức ảnh/video này khỏi kỷ yếu không?", type: "confirm",
                    onConfirm: async () => { const { doc, deleteDoc } = window.firebaseHooks; await deleteDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'gallery', id)); }
                });
            };

            const getSlideStyle = (index) => {
                const isActive = currentSlide === index;
                const isPast = currentSlide > index;
                return {
                    position: 'absolute', inset: 0,
                    transition: 'all 0.9s cubic-bezier(0.19, 1, 0.22, 1)',
                    opacity: isActive ? 1 : 0,
                    transform: isActive ? 'translateX(0) scale(1) rotateY(0deg)' : isPast ? 'translateX(-15%) scale(0.92) rotateY(5deg)' : 'translateX(15%) scale(1.08) rotateY(-5deg)',
                    zIndex: isActive ? 20 : 10,
                    pointerEvents: isActive ? 'auto' : 'none',
                    filter: isActive ? 'blur(0px)' : 'blur(15px)',
                    transformOrigin: 'center'
                };
            };

            // MÀN HÌNH CHỌN QUYỀN TRUY CẬP BAN ĐẦU
            if (userRole === null) {
                return (
                    <div className="fixed inset-0 z-[9999] bg-[#fdfbfb] flex flex-col items-center justify-center p-4">
                        <div className="absolute inset-0 z-0 opacity-40 pointer-events-none" style={{ backgroundImage: 'radial-gradient(#f43f5e 1px, transparent 1px)', backgroundSize: '40px 40px' }}></div>
                        
                        <div className="bg-white/90 backdrop-blur-xl border border-rose-100 rounded-[2rem] p-8 md:p-12 shadow-2xl max-w-lg w-full z-10 animate-slideUp text-center relative overflow-hidden">
                            <div className="absolute -top-10 -right-10 w-32 h-32 bg-rose-200 rounded-full blur-3xl opacity-50"></div>
                            <div className="absolute -bottom-10 -left-10 w-32 h-32 bg-blue-200 rounded-full blur-3xl opacity-50"></div>
                            
                            <div className="w-20 h-20 bg-rose-100 text-rose-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-6 shadow-inner border border-rose-200 relative z-10">
                                <i className="fa-solid fa-graduation-cap"></i>
                            </div>
                            
                            <h1 className="text-3xl md:text-4xl font-serif text-gray-800 mb-2 relative z-10">Chào mừng bạn!</h1>
                            <p className="text-sm text-gray-500 mb-8 relative z-10">Hãy cho chúng mình biết bạn là ai để chuẩn bị trải nghiệm phù hợp nhất nhé.</p>
                            
                            {!showAuthModal ? (
                                <div className="space-y-4 relative z-10">
                                    <button onClick={() => { setShowAuthModal(true); setAuthError(''); setAuthPassword(''); }} className="w-full py-4 bg-gradient-to-r from-rose-400 to-rose-500 text-white rounded-2xl font-bold shadow-md hover:shadow-lg hover:-translate-y-1 transition-all flex flex-col items-center justify-center gap-1 group">
                                        <span className="flex items-center gap-2 text-base"><i className="fa-solid fa-user-graduate group-hover:animate-bounce"></i> Mình là thành viên 12A3</span>
                                        <span className="text-[10px] opacity-80 font-normal uppercase tracking-widest">Đăng ảnh, sửa thông tin, lưu bút</span>
                                    </button>
                                    
                                    <button onClick={() => { localStorage.setItem('kyyeu_userRole', 'guest'); setUserRole('guest'); }} className="w-full py-4 bg-gray-100 text-gray-700 hover:bg-gray-200 border border-gray-200 rounded-2xl font-bold transition-all flex flex-col items-center justify-center gap-1">
                                        <span className="flex items-center gap-2 text-base"><i className="fa-solid fa-eye"></i> Mình là khách tham quan</span>
                                        <span className="text-[10px] text-gray-500 font-normal uppercase tracking-widest">Chế độ xem (Chỉ xem kỷ yếu)</span>
                                    </button>
                                </div>
                            ) : (
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const pass = authPassword.toLowerCase().trim();
                                    // Chấp nhận mật khẩu n23a032026 hoặc 12a32026
                                    if (pass === 'n23a032026' || pass === '12a32026') {
                                        localStorage.setItem('kyyeu_userRole', 'member');
                                        setUserRole('member');
                                        setShowAuthModal(false);
                                    } else {
                                        const newAttempts = authAttempts + 1;
                                        setAuthAttempts(newAttempts);
                                        // CẬP NHẬT: Nhập sai 3 lần là lập tức auto đẩy qua chế độ Khách
                                        if (newAttempts >= 3) {
                                            localStorage.setItem('kyyeu_userRole', 'guest');
                                            setUserRole('guest');
                                            setShowAuthModal(false);
                                            setCustomDialog({
                                                title: "Cảnh báo bảo mật",
                                                message: "Bạn đã nhập sai quá 3 lần! Hệ thống đã tự động chuyển bạn sang Chế độ Khách tham quan.",
                                                type: "alert"
                                            });
                                        } else {
                                            setAuthError(`Mật mã sai! Bạn còn ${3 - newAttempts} lần thử.`);
                                            setAuthPassword('');
                                        }
                                    }
                                }} className="relative z-10 animate-fadeIn">
                                    <h3 className="font-bold text-gray-800 mb-2">Xác thực thành viên</h3>
                                    <p className="text-xs text-gray-500 mb-4">Vui lòng nhập mật mã để chứng minh bạn là thành viên của lớp.</p>
                                    
                                    <input 
                                        type="password" 
                                        value={authPassword} 
                                        onChange={(e) => setAuthPassword(e.target.value)}
                                        placeholder="Nhập mật mã..." 
                                        className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl mb-2 text-center text-lg tracking-widest outline-none focus:border-rose-400 focus:bg-white transition-colors"
                                        autoFocus
                                    />
                                    
                                    {authError && <p className="text-xs text-rose-500 mb-2 font-medium animate-bounce"><i className="fa-solid fa-triangle-exclamation"></i> {authError}</p>}
                                    <p className="text-[10px] text-gray-400 italic mb-4">*Mật mã gợi ý: Tên lớp hoặc Tên lớp + Năm ra trường</p>
                                    
                                    <div className="flex gap-2 mt-4">
                                        <button type="button" onClick={() => setShowAuthModal(false)} className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold hover:bg-gray-200 transition-colors text-sm">Quay lại</button>
                                        <button type="submit" className="flex-1 py-3 bg-rose-500 text-white rounded-xl font-bold shadow-md hover:bg-rose-600 transition-colors text-sm">Xác nhận</button>
                                    </div>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            // ==== HỆ THỐNG RENDER GAME TUTORIAL (GUIDE BOT) ====
            const renderTutorialGuide = () => {
                if (tutorialStep === 0) return null;

                let content = {};
                let positionClass = "";

                switch (tutorialStep) {
                    case 1:
                        content = { title: "Bước 1: Tìm chính mình!", text: "Hãy nhấp vào 'Mảnh ghép' của bạn ở danh sách bên dưới, hoặc dùng nút Tìm kiếm có hiệu ứng phát sáng nhé.", next: null };
                        positionClass = "top-[15%] md:top-[25%] left-1/2 -translate-x-1/2";
                        break;
                    case 2:
                        content = { title: "Bước 2: Cập nhật thông tin", text: "Tuyệt vời! Bây giờ hãy nhấn vào nút 'Sửa hồ sơ' đang phát sáng để bắt đầu cập nhật.", next: null };
                        // Position tránh đè lên nút Sửa
                        positionClass = isMobile ? "top-[10%] left-1/2 -translate-x-1/2" : "top-[20%] left-[25%] -translate-x-1/2"; 
                        break;
                    case 3:
                        content = { title: "Bước 3: Thay áo mới", text: "Nhấp vào Ảnh Đại Diện để tải ảnh lên. Nhớ điền đầy đủ thông tin (ngoại trừ Tên đã được khóa), đặc biệt là Link Facebook nha!", next: 4 };
                        positionClass = "bottom-[10%] md:bottom-[15%] left-1/2 -translate-x-1/2";
                        break;
                    case 4:
                        content = { title: "Bước cuối: Khóa Ký Ức", text: "Xong rồi thì bấm 'Lưu Thay Đổi'. Nếu bạn chắc chắn 100% không cần đổi nữa, hãy bấm 'Chốt Vĩnh Viễn' (Khóa vĩnh viễn đó nha!).", next: 0 };
                        positionClass = "top-[10%] md:top-[20%] left-1/2 -translate-x-1/2";
                        break;
                }

                return (
                    <div className="fixed inset-0 z-[1000] pointer-events-none flex items-center justify-center">
                        <div className="absolute inset-0 bg-black/40 backdrop-blur-[2px] transition-all duration-300"></div>
                        
                        <div className={`absolute ${positionClass} w-[90%] max-w-[350px] pointer-events-auto transition-all duration-500 z-[1002]`}>
                            <div className="bg-white/95 backdrop-blur-xl border-[3px] border-rose-400 rounded-2xl p-4 shadow-[0_0_30px_rgba(244,63,94,0.4)] animate-slideUp relative">
                                
                                {/* Nút tắt Tutorial */}
                                <button onClick={() => setTutorialStep(0)} className="absolute -top-3 -right-3 w-8 h-8 bg-gray-800 text-white rounded-full border-2 border-white flex items-center justify-center hover:bg-rose-500 hover:scale-110 transition-transform shadow-md">
                                    <i className="fa-solid fa-xmark"></i>
                                </button>
                                
                                <div className="flex gap-3 items-start">
                                    <div className="w-12 h-12 bg-rose-100 rounded-full flex items-center justify-center text-2xl shrink-0 border-2 border-rose-200 shadow-inner">
                                        <span className="animate-bounce block">✨</span>
                                    </div>
                                    <div>
                                        <h4 className="font-bold text-rose-600 mb-1 text-sm uppercase tracking-wide">{content.title}</h4>
                                        <p className="text-xs text-gray-700 leading-relaxed mb-3">{content.text}</p>
                                        
                                        {content.next !== null && (
                                            <button 
                                                onClick={() => setTutorialStep(content.next)} 
                                                className="bg-gradient-to-r from-rose-400 to-rose-500 text-white px-4 py-2 rounded-full text-xs font-bold shadow-md hover:scale-105 transition-transform flex items-center gap-2"
                                            >
                                                {content.next === 0 ? "Đã hiểu! Bắt đầu thôi" : "Đã hiểu, Tiếp tục"} <i className="fa-solid fa-arrow-right"></i>
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };
            
            const renderEditForm = () => (
                <div className="w-full flex flex-col h-full max-h-full relative z-[1001]">
                    <h4 className="font-serif text-lg md:text-2xl text-gray-800 mb-2 md:mb-4 border-b border-gray-200 pb-2 md:pb-3 text-center shrink-0">Cập nhật hồ sơ</h4>
                    
                    {/* AVATAR UPLOAD - Được Highlight ở Bước 3 */}
                    <div className={`flex justify-center mb-3 md:mb-5 relative group cursor-pointer w-16 h-16 md:w-24 md:h-24 mx-auto shrink-0 hover:scale-105 transition-all duration-300 ${tutorialStep === 3 ? 'tutorial-highlight' : ''}`}>
                        <div className="w-full h-full rounded-full overflow-hidden border-4 border-white shadow-md bg-gray-100 relative z-10">
                            <img src={editForm.avatar} className="w-full h-full object-cover" alt="preview"/>
                        </div>
                        <label className="absolute inset-0 bg-black/40 rounded-full flex flex-col items-center justify-center text-white opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer z-20">
                            <i className="fa-solid fa-camera md:mb-1 text-[10px] md:text-sm"></i>
                            <span className="text-[7px] md:text-[9px] uppercase font-medium tracking-wider hidden md:block">Đổi ảnh</span>
                            <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload}/>
                        </label>
                    </div>

                    <div className="space-y-2.5 md:space-y-3 text-sm font-sans mb-2 md:mb-4 flex-1 overflow-y-auto pr-1 hide-scrollbar">
                        
                        {/* HỌ VÀ TÊN - READONLY */}
                        <div className={tutorialStep === 3 ? 'relative z-10 bg-white' : ''}>
                            <label className="block text-[9px] md:text-[10px] uppercase tracking-wider text-gray-400 font-semibold mb-1 ml-1 flex justify-between items-center">
                                <span>Họ và Tên</span>
                                <span className="text-[8px] text-rose-400 font-bold tracking-widest bg-rose-50 px-2 py-0.5 rounded-full"><i className="fa-solid fa-lock"></i> Khóa</span>
                            </label>
                            {/* Input dùng readOnly và style xám để biểu thị không sửa được */}
                            <input type="text" value={editForm.name} readOnly title="Bạn không thể tự sửa tên trong danh sách" className="w-full bg-gray-100 text-gray-500 border border-gray-200 rounded-lg md:rounded-xl p-2 md:p-2.5 text-xs md:text-sm outline-none cursor-not-allowed shadow-inner font-medium" />
                        </div>
                        
                        <div className={tutorialStep === 3 ? 'relative z-10 bg-white' : ''}>
                            <label className="block text-[9px] md:text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1 ml-1">Lưu bút cá nhân</label>
                            <textarea rows="2" value={editForm.quote} onChange={e=>setEditForm({...editForm, quote: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg md:rounded-xl p-2 md:p-2.5 text-xs md:text-sm outline-none focus:border-rose-400 resize-none font-serif shadow-sm" />
                        </div>
                        
                        {/* FACEBOOK LINK - Được highlight nổi bật thêm ở bước 3 vì bắt buộc */}
                        <div className={`${tutorialStep === 3 ? 'tutorial-highlight p-1 rounded-xl' : ''}`}>
                            <label className="block text-[9px] md:text-[10px] uppercase tracking-wider text-rose-500 font-bold mb-1 ml-1">Facebook Link (*)</label>
                            <input type="url" placeholder="https://fb.com/..." value={editForm.facebook || ''} onChange={e=>setEditForm({...editForm, facebook: e.target.value})} className="w-full bg-white border border-rose-300 rounded-lg md:rounded-xl p-2 md:p-2.5 text-xs md:text-sm outline-none focus:border-rose-500 transition-colors shadow-sm relative z-10" />
                        </div>
                        
                        <div className={`grid grid-cols-2 gap-2 ${tutorialStep === 3 ? 'relative z-10 bg-white' : ''}`}>
                            <div>
                                <label className="block text-[9px] md:text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1 ml-1">Instagram</label>
                                <input type="text" placeholder="@username hoặc link..." value={editForm.instagram || ''} onChange={e=>setEditForm({...editForm, instagram: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg md:rounded-xl p-2 md:p-2.5 text-[10px] md:text-xs outline-none focus:border-rose-400 transition-colors shadow-sm" />
                            </div>
                            <div>
                                <label className="block text-[9px] md:text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1 ml-1">TikTok</label>
                                <input type="text" placeholder="@username hoặc link..." value={editForm.tiktok || ''} onChange={e=>setEditForm({...editForm, tiktok: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg md:rounded-xl p-2 md:p-2.5 text-[10px] md:text-xs outline-none focus:border-rose-400 transition-colors shadow-sm" />
                            </div>
                        </div>
                        <div className={`pt-1 md:pt-2 ${tutorialStep === 3 ? 'relative z-10 bg-white' : ''}`}>
                            <label className="block text-[9px] md:text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1 md:mb-2 ml-1 text-center">Màu Chủ Đạo</label>
                            <div className="flex gap-2 md:gap-3 justify-center">
                                {PROFILE_THEMES.map(theme => (
                                    <div key={theme.id} onClick={() => setEditForm({...editForm, theme: theme.id})} className={`w-5 h-5 md:w-6 md:h-6 rounded-full cursor-pointer transition-transform hover:scale-110 ${theme.bg} ${editForm.theme === theme.id ? 'ring-2 ring-offset-2 ring-gray-800' : 'shadow-sm'}`}/>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* SAVE BUTTONS - Được Highlight ở Bước 4 */}
                    <div className={`mt-auto space-y-1.5 md:space-y-2 pt-2 border-t border-gray-200 shrink-0 pb-2 ${tutorialStep === 4 ? 'tutorial-highlight p-1.5 rounded-xl bg-white' : ''}`}>
                        <button onClick={() => handleSaveProfile(false)} disabled={isUploading} className="w-full py-2 md:py-2.5 bg-gray-900 text-white rounded-lg md:rounded-xl text-[10px] md:text-xs uppercase tracking-widest font-semibold hover:bg-black transition-colors disabled:opacity-50 flex justify-center items-center gap-2 relative z-10">
                            {isUploading ? <i className="fa-solid fa-spinner fa-spin"></i> : 'Lưu Thay Đổi'}
                        </button>
                        <button onClick={() => setCustomDialog({title: "Chốt Hồ Sơ?", message: "Sau khi chốt, bạn sẽ không thể chỉnh sửa thông tin được nữa. Bạn chắc chứ?", type: "confirm", onConfirm: () => handleSaveProfile(true)})} disabled={isUploading} className="w-full py-2 md:py-2.5 border border-rose-200 text-rose-500 rounded-lg md:rounded-xl text-[10px] md:text-xs uppercase tracking-widest hover:bg-rose-50 transition-colors flex items-center justify-center gap-2 font-semibold bg-white relative z-10">
                            Chốt Vĩnh Viễn <i className="fa-solid fa-lock text-[8px] md:text-[10px]"></i>
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="w-screen h-[100dvh] relative bg-[#fdfbfb]" onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
                    {/* Nút reset Role nằm ở góc dưới bên phải - Đề phòng User muốn thoát chế độ Khách */}
                    {userRole && (
                        <button onClick={() => { 
                            localStorage.removeItem('kyyeu_userRole'); 
                            setUserRole(null); 
                            setAuthAttempts(0); // Reset lại số lần thử
                            setShowAuthModal(false);
                        }} className="fixed bottom-4 right-4 z-[900] w-8 h-8 rounded-full bg-white/60 backdrop-blur border border-gray-200 text-gray-500 hover:text-rose-500 hover:border-rose-200 shadow-sm flex items-center justify-center text-xs transition-all hover:scale-110" title="Đổi vai trò">
                            <i className="fa-solid fa-users-gear"></i>
                        </button>
                    )}

                    {/* Render Tutorial Guide */}
                    {renderTutorialGuide()}

                    <div className="absolute inset-0 z-0 pointer-events-none opacity-40" style={{ backgroundImage: 'radial-gradient(#f43f5e 1px, transparent 1px)', backgroundSize: '40px 40px' }}></div>
                    <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-rose-200/40 blur-[100px] z-0 pointer-events-none transition-all duration-1000 ease-in-out"></div>
                    
                    {appSettings.isTimelineLocked && (
                        <div className="absolute top-4 left-1/2 -translate-x-1/2 z-[100] bg-gray-900/80 backdrop-blur-md text-white text-[10px] md:text-xs px-4 py-1.5 rounded-full shadow-lg flex items-center gap-2 animate-fadeIn border border-gray-700">
                            <i className="fa-solid fa-lock text-rose-400"></i> Kỷ yếu đã được niêm phong
                        </div>
                    )}

                    {showFirebaseError && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm animate-fadeIn">
                            <div className="bg-white rounded-3xl p-6 md:p-8 max-w-lg w-full shadow-2xl relative">
                                <button onClick={() => setShowFirebaseError(false)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 transition-transform hover:scale-110"><i className="fa-solid fa-xmark text-xl"></i></button>
                                <div className="text-rose-500 mb-4 text-center"><i className="fa-solid fa-triangle-exclamation text-5xl"></i></div>
                                <h2 className="text-xl font-bold text-center mb-4">Cần cấu hình Database</h2>
                                <p className="text-sm text-gray-600 mb-4 leading-relaxed">Hệ thống không thể lưu trữ dữ liệu. Vui lòng sửa Firestore Rules thành:</p>
                                <div className="bg-gray-100 p-3 rounded-lg text-xs font-mono text-rose-500 mb-6 overflow-x-auto whitespace-pre-wrap">
                                    {`rules_version = '2';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    match /artifacts/cd12a3/public/data/{document=**} {\n      allow read, write: if true;\n    }\n  }\n}`}
                                </div>
                                <button onClick={() => setShowFirebaseError(false)} className="w-full py-3 bg-rose-500 text-white rounded-xl font-medium shadow-md shadow-rose-200 hover:scale-[1.02] transition-transform">Đã hiểu</button>
                            </div>
                        </div>
                    )}

                    {customDialog && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm animate-fadeIn">
                            <div className="bg-white/90 backdrop-blur-xl rounded-3xl w-full max-w-sm shadow-2xl overflow-hidden border border-white/50 animate-slideUp">
                                <div className="p-6 text-center">
                                    <h3 className="text-lg font-semibold text-gray-800 mb-2">{customDialog.title}</h3>
                                    <p className="text-sm text-gray-500">{customDialog.message}</p>
                                </div>
                                <div className="flex border-t border-gray-200/60 p-2 gap-2">
                                    {customDialog.type === 'confirm' && <button onClick={() => setCustomDialog(null)} className="flex-1 py-2.5 bg-gray-100 text-gray-600 rounded-xl text-xs font-semibold hover:bg-gray-200 transition-colors">Hủy</button>}
                                    <button onClick={() => { if (customDialog.onConfirm) customDialog.onConfirm(); setCustomDialog(null); }} className="flex-1 py-2.5 bg-rose-500 text-white rounded-xl text-xs font-semibold hover:bg-rose-600 shadow-md shadow-rose-200">Xác nhận</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {selectedMedia && (
                        <div className="fixed inset-0 z-[700] flex items-center justify-center p-4 md:p-10 bg-black/90 backdrop-blur-lg animate-fadeIn" onClick={() => setSelectedMedia(null)}>
                            <button className="absolute top-6 right-6 md:top-10 md:right-10 text-white/50 hover:text-white text-3xl z-50 transition-transform hover:scale-110"><i className="fa-solid fa-xmark"></i></button>
                            <div className="w-full max-w-5xl h-full flex flex-col items-center justify-center animate-slideUp" onClick={e => e.stopPropagation()}>
                                {selectedMedia.type === 'image' ? <img src={selectedMedia.url} className="max-w-full max-h-[85vh] object-contain rounded-2xl shadow-2xl" /> : 
                                <div className="w-full aspect-video rounded-2xl overflow-hidden shadow-2xl bg-black"><iframe src={getEmbedUrl(selectedMedia.url)} className="w-full h-full border-0" allowFullScreen></iframe></div>}
                                {selectedMedia.caption && <p className="mt-4 text-white text-lg font-cursive text-center drop-shadow-md">{selectedMedia.caption}</p>}
                            </div>
                        </div>
                    )}

                    {/* MODAL THÊM KỶ NIỆM */}
                    {showAddMedia && !appSettings.isTimelineLocked && !isGuest && (
                        <div className="fixed inset-0 z-[600] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm animate-fadeIn">
                            <div className="bg-white/95 backdrop-blur-xl rounded-3xl w-full max-w-md shadow-2xl relative animate-slideUp p-5 md:p-6 border border-white/50">
                                <button onClick={() => setShowAddMedia(false)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-800 bg-gray-100/80 rounded-full w-8 h-8 flex items-center justify-center transition-transform hover:scale-110 shadow-sm z-10"><i className="fa-solid fa-xmark"></i></button>
                                <h3 className="font-serif text-xl md:text-2xl text-gray-800 mb-2 text-center">Thêm Mảnh Ghép</h3>
                                <p className="text-center text-[10px] uppercase tracking-widest text-rose-500 mb-4 font-bold">{mediaForm.context === 'journey' ? 'Dành cho Hành Trình Lớp' : 'Dành cho Thước Phim Chung'}</p>
                                
                                {mediaForm.context !== 'journey' && (
                                    <div className="flex justify-center gap-2 mb-5">
                                        <span className="text-[10px] md:text-xs text-gray-500 font-medium py-1.5 px-2 bg-gray-100 rounded-lg flex items-center">Phân loại:</span>
                                        {['10A3', '11A3', '12A3'].map(g => (
                                            <button key={g} onClick={() => setMediaForm({...mediaForm, grade: g})} className={`px-3 py-1.5 rounded-lg text-[10px] md:text-xs font-bold transition-colors ${mediaForm.grade === g ? 'bg-rose-100 text-rose-600 border border-rose-200 shadow-sm' : 'bg-gray-50 text-gray-500 border border-gray-200 hover:bg-gray-100'}`}>
                                                {g}
                                            </button>
                                        ))}
                                    </div>
                                )}

                                <div className="flex flex-wrap justify-center gap-2 mb-4 pt-4 border-t border-gray-100">
                                    <button onClick={() => setMediaForm({...mediaForm, type: 'image', url: ''})} className={`px-4 py-2 rounded-full text-[10px] md:text-xs font-medium transition-colors flex items-center gap-2 ${mediaForm.type === 'image' ? 'bg-gray-800 text-white shadow-md' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}><i className="fa-regular fa-image"></i> Ảnh từ máy</button>
                                    <button onClick={() => setMediaForm({...mediaForm, type: 'video', url: ''})} className={`px-4 py-2 rounded-full text-[10px] md:text-xs font-medium transition-colors flex items-center gap-2 ${mediaForm.type === 'video' ? 'bg-gray-800 text-white shadow-md' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}><i className="fa-solid fa-link"></i> Link Video</button>
                                </div>
                                
                                {mediaForm.type === 'image' ? (
                                    <label className="flex flex-col items-center justify-center w-full h-36 md:h-40 border-2 border-dashed border-rose-200 rounded-2xl bg-gray-50 cursor-pointer hover:bg-rose-50 mb-4 transition-colors relative overflow-hidden group">
                                        {mediaForm.url ? <img src={mediaForm.url} className="w-full h-full object-contain bg-black/5" /> : (
                                            <div className="text-center">
                                                <div className="w-12 h-12 bg-rose-100 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-2 group-hover:scale-110 transition-transform"><i className="fa-solid fa-cloud-arrow-up text-xl"></i></div>
                                                <span className="text-xs md:text-sm text-gray-600 font-medium block">Chạm để chọn ảnh</span>
                                                <span className="text-[9px] md:text-[10px] text-gray-400 mt-1 block">Hỗ trợ JPG, PNG</span>
                                            </div>
                                        )}
                                        <input type="file" accept="image/*" className="hidden" onChange={(e) => { const file = e.target.files[0]; if (file) compressImage(file, (res) => setMediaForm({...mediaForm, url: res, type: 'image'})); }} />
                                    </label>
                                ) : (
                                    <div className="flex flex-col gap-2 mb-4">
                                        <div className="bg-sky-50 border border-sky-100 rounded-xl p-3 text-[10px] md:text-xs text-sky-700 leading-relaxed shadow-sm">
                                            <p className="font-semibold mb-1 flex items-center gap-1.5"><i className="fa-solid fa-circle-info"></i> Mẹo tải Video:</p>
                                            <ul className="list-disc pl-4 space-y-0.5 opacity-90">
                                                <li>Up video lên Google Drive hoặc YouTube.</li>
                                                <li>Mở quyền truy cập "Bất kỳ ai có liên kết".</li>
                                            </ul>
                                        </div>
                                        <input type="text" placeholder="Dán link Video (Youtube, Google Drive...)" value={mediaForm.url} onChange={(e) => setMediaForm({...mediaForm, url: e.target.value})} className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-xs md:text-sm outline-none focus:border-rose-400 focus:bg-white transition-colors" />
                                    </div>
                                )}
                                
                                <input type="text" placeholder="Viết chú thích ngắn gọn..." value={mediaForm.caption} onChange={(e) => setMediaForm({...mediaForm, caption: e.target.value})} className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-xs md:text-sm outline-none focus:border-rose-400 focus:bg-white mb-5 transition-colors" />

                                <button onClick={saveMediaToFirebase} disabled={!mediaForm.url || isUploading} className="w-full py-3 bg-rose-500 text-white rounded-xl text-xs md:text-sm font-bold tracking-widest hover:bg-rose-600 active:scale-[0.98] disabled:opacity-50 transition-all shadow-md shadow-rose-200 flex items-center justify-center gap-2">
                                    {isUploading ? <><i className="fa-solid fa-spinner fa-spin"></i> Đang tải lên...</> : <><i className="fa-solid fa-paper-plane"></i> Đăng Lên Kỷ Yếu</>}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* THEATER MODE SCREEN (RẠP CHIẾU PHIM) */}
                    {isTheaterMode && (
                        <div className="fixed inset-0 z-[500] bg-black flex items-center justify-center overflow-hidden animate-fadeIn">
                            <button onClick={() => setIsTheaterMode(false)} className="absolute top-6 right-6 text-white/50 hover:text-white z-[550] text-3xl transition-transform hover:scale-110"><i className="fa-solid fa-xmark"></i></button>
                            {/* ... (Phần Theater giữ nguyên) ... */}
                            {presentationItems.length > 0 ? (
                                <div className="relative w-full h-full flex items-center justify-center bg-black">
                                    <button onClick={prevTheaterSlide} className="absolute left-2 md:left-8 top-1/2 -translate-y-1/2 text-white/20 hover:text-white z-[550] text-4xl md:text-6xl transition-all hover:scale-110"><i className="fa-solid fa-chevron-left"></i></button>
                                    <button onClick={nextTheaterSlide} className="absolute right-2 md:right-8 top-1/2 -translate-y-1/2 text-white/20 hover:text-white z-[550] text-4xl md:text-6xl transition-all hover:scale-110"><i className="fa-solid fa-chevron-right"></i></button>

                                    {presentationItems.map((item, idx) => {
                                        const isJourney = theaterModeType === 'journey';
                                        const isActive = idx === theaterCurrentIndex;
                                        return (
                                            <div key={item.id} className={`absolute inset-0 transition-opacity duration-[1000ms] ease-in-out flex items-center justify-center overflow-hidden bg-black ${isActive ? 'opacity-100 z-[520]' : 'opacity-0 z-0 pointer-events-none'}`}>
                                                {isActive && (
                                                    item.type === 'titleCard' ? (
                                                        <div className="w-full h-full flex flex-col items-center justify-center px-4 bg-black">
                                                            <h1 className="text-2xl md:text-5xl lg:text-6xl font-bold uppercase tracking-[0.2em] md:tracking-[0.4em] text-white animate-titleReveal text-center drop-shadow-2xl">{item.title}</h1>
                                                        </div>
                                                    ) : item.type === 'endingCard' ? (
                                                        <div className="w-full h-full flex flex-col items-center justify-center px-8 bg-black">
                                                            <p className="text-xl md:text-4xl font-serif italic text-rose-200 animate-textReveal text-center drop-shadow-2xl max-w-5xl leading-relaxed">{item.title}</p>
                                                        </div>
                                                    ) : item.type === 'image' ? (
                                                        <img src={item.url} className={`w-full h-full object-contain origin-center animate-kenburns ${!isJourney ? 'sepia-[0.3] grayscale-[0.1] contrast-125 brightness-90' : 'brightness-100'}`} />
                                                    ) : (
                                                        <div className="w-full max-w-5xl aspect-video rounded-xl md:rounded-2xl overflow-hidden shadow-2xl relative z-[530] pointer-events-auto bg-black border border-white/10">
                                                            <iframe src={getEmbedUrl(item.url)} className="w-full h-full border-0" allowFullScreen></iframe>
                                                        </div>
                                                    )
                                                )}
                                                {item.caption && isActive && item.type !== 'titleCard' && item.type !== 'endingCard' && (
                                                    <div className="absolute bottom-12 md:bottom-20 left-0 w-full text-center z-[540] animate-slideUp pointer-events-none">
                                                        <div className="inline-block px-8 py-4 bg-black/40 backdrop-blur-sm rounded-3xl border border-white/10 shadow-2xl">
                                                            <p className="text-amber-50 font-serif italic text-xl md:text-3xl drop-shadow-lg max-w-3xl mx-auto">"{item.caption}"</p>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )
                                    })}
                                    <div className="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-1.5 md:gap-2 z-[550] flex-wrap justify-center max-w-[80%]">
                                        {presentationItems.map((item, i) => {
                                            if (item.type === 'titleCard' || item.type === 'endingCard') return null; 
                                            return <div key={i} className={`h-1.5 md:h-2 rounded-full transition-all duration-500 ${i === theaterCurrentIndex ? 'bg-rose-400 w-6 md:w-8' : 'bg-white/30 w-1.5 md:w-2 cursor-pointer hover:bg-white/60'}`} onClick={() => setTheaterCurrentIndex(i)}></div>
                                        })}
                                    </div>
                                </div>
                            ) : (
                                <div className="z-[510] text-center text-white/50 animate-pulse">
                                    <i className="fa-solid fa-film text-5xl mb-4"></i><p className="font-serif italic text-xl mt-4">Chưa có bức ảnh nào để trình chiếu...</p>
                                </div>
                            )}
                        </div>
                    )}

                    {currentSlide > 0 && <button onClick={prevSlide} className="fixed left-2 md:left-6 top-1/2 -translate-y-1/2 z-40 w-10 h-10 md:w-14 md:h-14 rounded-full glass flex items-center justify-center text-gray-600 hover:text-rose-500 hover:bg-white transition-all transform hover:scale-110 shadow-lg"><i className="fa-solid fa-chevron-left"></i></button>}
                    {currentSlide < totalSlides - 1 && <button onClick={nextSlide} className="fixed right-2 md:right-6 top-1/2 -translate-y-1/2 z-40 w-10 h-10 md:w-14 md:h-14 rounded-full glass flex items-center justify-center text-gray-600 hover:text-rose-500 hover:bg-white transition-all transform hover:scale-110 shadow-lg"><i className="fa-solid fa-chevron-right"></i></button>}

                    <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 flex items-center gap-2 z-40 glass px-4 py-2 rounded-full">
                        {Array.from({length: totalSlides}).map((_, idx) => (
                            <button key={idx} onClick={() => setCurrentSlide(idx)} className={`transition-all rounded-full h-2 ${currentSlide === idx ? 'bg-rose-500 w-6' : 'bg-gray-300 w-2 hover:bg-rose-300'}`}></button>
                        ))}
                    </div>

                    <div className="relative w-full h-[100dvh] z-10 overflow-hidden" style={{ perspective: '2000px', transformStyle: 'preserve-3d' }}>
                        
                        {/* SLIDE 0 & 1 GIỮ NGUYÊN ... */}
                        <div style={getSlideStyle(0)} className="w-full h-full flex flex-col justify-center items-center px-4 md:px-6 relative overflow-hidden group">
                            <div className="absolute inset-0 z-0 opacity-40">
                                <img src="https://i.pinimg.com/736x/01/81/1d/01811d3880cd97de1f43bc1ad8730eb0.jpg" className="w-full h-full object-cover animate-kenburns-slow" alt="Light bg"/>
                                <div className="absolute inset-0 bg-gradient-to-b from-white/60 via-transparent to-white/90"></div>
                            </div>
                            <div className="text-center max-w-4xl mx-auto transition-all duration-1000 delay-300 transform z-10 glass p-8 md:p-16 rounded-[3rem] shadow-xl border border-white/60" style={{ transform: currentSlide === 0 ? 'translateY(0)' : 'translateY(30px)' }}>
                                <div className="inline-flex items-center gap-2 px-5 py-2 rounded-full bg-rose-50 border border-rose-100 text-rose-500 text-[10px] md:text-xs font-medium uppercase tracking-[0.3em] mb-6 md:mb-8 shadow-sm">
                                    <i className="fa-solid fa-sparkles"></i> Niên Khóa 2023 - 2026
                                </div>
                                <h1 className="text-5xl md:text-7xl lg:text-8xl font-serif text-gray-800 mb-6 leading-tight">
                                    Ký Ức <br/> <span className="font-cursive text-rose-500 text-6xl md:text-8xl lg:text-9xl ml-2 drop-shadow-sm">12A3</span>
                                </h1>
                                <p className="text-sm md:text-lg text-gray-600 max-w-xl mx-auto leading-relaxed font-light tracking-wide px-4">
                                    Một bộ phim thanh xuân được viết bằng nụ cười, nước mắt và những tháng năm rực rỡ nhất. Lướt qua để lật mở từng trang hồi ức...
                                </p>
                            </div>
                        </div>

                        <div style={getSlideStyle(1)} className="w-full h-full flex items-center justify-center px-4 md:px-6">
                            <div className={`max-w-5xl mx-auto w-full glass rounded-[2.5rem] p-6 md:p-12 flex flex-col md:flex-row gap-8 items-center transition-all duration-1000 delay-200 transform ${currentSlide === 1 ? 'translate-y-0' : 'translate-y-10'}`}>
                                <div className="w-full md:w-2/5 flex justify-center">
                                    <div className="w-56 h-72 md:w-64 md:h-[22rem] rounded-t-full rounded-b-[40px] p-2 bg-white shadow-xl border border-gray-100 transition-transform hover:scale-105 duration-500">
                                        <div className="w-full h-full rounded-t-full rounded-b-[32px] overflow-hidden bg-rose-50">
                                            <img src="teacher.jpg" alt="Thầy Chủ Nhiệm" className="w-full h-full object-cover" />
                                        </div>
                                    </div>
                                </div>
                                <div className="w-full md:w-3/5 text-center md:text-left">
                                    <h2 className="text-xs uppercase tracking-[0.2em] font-semibold text-rose-400 mb-2">Người Dẫn Đường</h2>
                                    <h3 className="text-3xl md:text-5xl font-serif text-gray-800 mb-6">Thầy Nguyễn Văn Hoàng</h3>
                                    <p className="text-lg md:text-2xl font-serif italic text-gray-600 leading-relaxed mb-6 relative"><i className="fa-solid fa-quote-left absolute -top-4 -left-4 text-gray-200 text-3xl"></i>"Hãy nhớ chúng ta đã từng ở chung một mái nhà, nơi đó có thầy có các  bạn và có những gì đẹp nhất tuổi học trò."</p>
                                </div>
                            </div>
                        </div>
                        
                        {/* SLIDE 2: THÀNH VIÊN - NƠI BẮT ĐẦU TUTORIAL */}
                        <div style={getSlideStyle(2)} className="w-full h-full flex flex-col pt-16 md:pt-20 pb-20">
                            <div className="text-center mb-6 md:mb-10 px-4 relative z-[10]">
                                <div className="flex flex-col sm:flex-row items-center justify-center gap-3 mb-2">
                                    <h2 className="text-3xl md:text-4xl font-serif text-gray-800">Mảnh Ghép Thanh Xuân</h2>
                                    <div className="flex items-center gap-2">
                                        {/* Nút Tìm kiếm được Highlight ở Bước 1 */}
                                        <button 
                                            onClick={() => setShowMemberList(true)} 
                                            className={`w-8 h-8 rounded-full bg-rose-50 border border-rose-100 text-rose-500 hover:bg-rose-500 hover:text-white transition-all shadow-sm flex items-center justify-center text-sm ${tutorialStep === 1 ? 'tutorial-highlight scale-125' : ''}`} 
                                            title="Tra cứu số thứ tự"
                                        >
                                            <i className="fa-solid fa-list-ol"></i>
                                        </button>
                                        
                                        {/* NÚT KÍCH HOẠT HƯỚNG DẪN - Ẩn đối với Khách */}
                                        {!isGuest && (
                                            <button 
                                                onClick={() => setTutorialStep(1)} 
                                                className={`px-3 py-1.5 rounded-full bg-rose-500 text-white text-[10px] md:text-xs font-bold hover:bg-rose-600 transition-all shadow-md flex items-center gap-2 ${tutorialStep === 0 ? 'animate-pulse' : 'opacity-50'}`}
                                            >
                                                <i className="fa-solid fa-gamepad"></i> Hướng Dẫn
                                            </button>
                                        )}
                                    </div>
                                </div>
                                <p className="text-gray-500 text-xs tracking-widest uppercase">49 Câu Chuyện Nhỏ</p>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto hide-scrollbar px-4 md:px-12 pb-10">
                                <div className="max-w-6xl mx-auto grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-7 gap-3 md:gap-5">
                                    {members.map((member, index) => (
                                        <div 
                                            key={member.id} 
                                            onClick={() => { 
                                                setSelectedMember(member); 
                                                setEditForm(member); 
                                                setIsEditing(false); 
                                                // Nếu đang ở bước 1, tự động chuyển sang bước 2
                                                if (tutorialStep === 1) setTimeout(() => setTutorialStep(2), 300);
                                            }} 
                                            className={`glass rounded-2xl p-3 flex flex-col items-center text-center cursor-pointer group hover:border-rose-200 transition-all transform hover:-translate-y-1 shadow-sm hover:shadow-md relative ${tutorialStep === 1 && index === 0 ? 'tutorial-highlight scale-105' : ''}`}

                                            <h3 className="font-sans font-semibold text-gray-800 text-[11px] md:text-sm group-hover:text-rose-500 transition-colors line-clamp-1 w-full">{member.name}</h3>

                                        </div>
                                    ))}
                                </div>
                            </div>

                                {/* HTML cũ phần Header Thước phim */}
